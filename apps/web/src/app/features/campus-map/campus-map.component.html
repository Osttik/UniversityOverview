<section class="map-page">
  <div class="map-page__main">
    <div class="map-toolbar">
      <div>
        <p class="eyebrow">Campus map</p>
        <h2>Interactive campus workspace</h2>
      </div>
      <div class="map-toolbar__actions">
        <button mat-stroked-button type="button">
          <mat-icon fontSet="material-symbols-outlined">search</mat-icon>
          Find room
        </button>
        <button mat-flat-button color="primary" type="button">
          <mat-icon fontSet="material-symbols-outlined">route</mat-icon>
          Build route
        </button>
      </div>
    </div>

    <div class="map-canvas" aria-label="Campus map preview">
      @for (location of locations; track location.id) {
        <button
          class="map-pin"
          type="button"
          [style.left.%]="location.coordinates.x"
          [style.top.%]="location.coordinates.y"
          [attr.aria-label]="location.name"
        >
          <mat-icon fontSet="material-symbols-outlined">location_on</mat-icon>
        </button>
      }
    </div>
  </div>

  <mat-card class="locations">
    <mat-card-header>
      <mat-card-title>Locations</mat-card-title>
      <mat-card-subtitle>Typed data from the campus map API</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-list>
        @for (location of locations; track location.id) {
          <mat-list-item>
            <mat-icon matListItemIcon fontSet="material-symbols-outlined">apartment</mat-icon>
            <div matListItemTitle>{{ location.name }}</div>
            <div matListItemLine>{{ location.type }} {{ location.buildingCode || '' }}</div>
          </mat-list-item>
        }
      </mat-list>
    </mat-card-content>
  </mat-card>
</section>
