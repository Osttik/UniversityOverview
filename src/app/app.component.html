<main class="shell">
  <aside class="panel" aria-label="Campus map tools">
    <div class="brand">
      <img src="assets/jojo.jpg" alt="University logo">
      <div>
        <p>University Overview</p>
        <span>Interactive campus map</span>
      </div>
    </div>

    <div class="controls" aria-label="Map controls">
      <button type="button" (click)="zoomOut()" aria-label="Zoom out">-</button>
      <strong>{{ zoomPercent }}%</strong>
      <button type="button" (click)="zoomIn()" aria-label="Zoom in">+</button>
      <button class="reset" type="button" (click)="resetViewport()">Reset</button>
    </div>

    <section class="marker-list" aria-label="Campus locations">
      <button
        type="button"
        *ngFor="let marker of markers"
        [class.active]="activeMarker()?.id === marker.id"
        (click)="activeMarker.set(marker)">
        <span>{{ marker.name }}</span>
        <small>{{ marker.category }}</small>
      </button>
    </section>
  </aside>

  <section class="map-card" aria-label="Campus map">
    <div
      #viewport
      class="viewport"
      (wheel)="onWheel($event)"
      (pointerdown)="startPan($event)"
      (pointermove)="movePan($event)"
      (pointerup)="endPan($event)"
      (pointercancel)="endPan($event)"
      (click)="clearMarker()">
      <div
        class="map-layer"
        [style.width.px]="mapWidth"
        [style.height.px]="mapHeight"
        [style.transform]="transform">
        <img class="map-image" src="assets/maps/1.1.jpg" alt="Campus overview map" draggable="false">

        <button
          type="button"
          class="marker"
          *ngFor="let marker of markers"
          [class.selected]="activeMarker()?.id === marker.id"
          [style.left.%]="marker.x"
          [style.top.%]="marker.y"
          (click)="selectMarker(marker, $event)"
          [attr.aria-label]="marker.name">
          <span></span>
        </button>
      </div>

      <article class="detail" *ngIf="activeMarker() as marker">
        <small>{{ marker.category }}</small>
        <h1>{{ marker.name }}</h1>
        <p>Marker position {{ marker.x }}%, {{ marker.y }}%</p>
      </article>
    </div>
  </section>
</main>
