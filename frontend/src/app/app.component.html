<mat-toolbar color="primary" class="app-toolbar">
  <span>University Overview</span>
  <span class="toolbar-spacer"></span>
  <a mat-raised-button color="accent" href="/api/health">API health</a>
</mat-toolbar>

<main class="overview-shell">
  <section class="map-panel" aria-label="Campus map">
    <img src="/assets/images/1.1.jpg" alt="Campus map">
    <div class="map-marker" aria-hidden="true"></div>
    <div class="map-caption">
      {{ selectedUniversity?.mapLabel ?? 'Loading campus map' }}
    </div>
  </section>

  <section class="content-panel">
    <div class="identity">
      <img src="/assets/jojo.jpg" alt="University overview identity">
      <div>
        <h1>University program explorer</h1>
        <p>Browse local JSON-backed university summaries served by NestJS and rendered in Angular.</p>
      </div>
    </div>

    <div *ngIf="error" class="error-state" role="alert">{{ error }}</div>

    <div *ngIf="!error && universities.length === 0" class="loading-state">
      <mat-spinner diameter="36"></mat-spinner>
    </div>

    <div class="university-list" *ngIf="universities.length > 0">
      <mat-card
        *ngFor="let university of universities"
        class="university-card"
        [class.selected]="university.id === selectedUniversityId">
        <mat-card-header>
          <mat-card-title>{{ university.name }}</mat-card-title>
          <mat-card-subtitle>{{ university.city }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <mat-chip-set aria-label="Programs">
            <mat-chip *ngFor="let program of university.programs">{{ program }}</mat-chip>
          </mat-chip-set>
        </mat-card-content>
        <mat-card-actions align="end">
          <button mat-button color="primary" type="button" (click)="selectUniversity(university.id)">
            <mat-icon>map</mat-icon>
            Show on map
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
  </section>
</main>
